<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NT Global Hub</title>
    <!-- 'defer' attribute add kiya hai taake script smooth load ho -->
    <script src="https://small-disk-e02c.ntstudio00.workers.dev/paddle-script" defer></script>
</head>
<body>

    <div style="text-align:center; padding: 50px;">
        <h1>Welcome to NT Global Hub</h1>
        <button onclick="openCheckout('pri_01ksmjvxcfxha6v8avt5f47ppt')" style="padding: 15px 30px; font-size: 20px; cursor: pointer;">
            Buy Now ($50)
        </button>
    </div>

    <script>
        // Paddle Initialization
        // Humne ek chota sa check add kiya hai taake agar script load hone mein 
        // thoda time le, toh code break na ho.
        window.addEventListener('DOMContentLoaded', (event) => {
            if (typeof Paddle !== 'undefined') {
                Paddle.Initialize({ 
                    token: 'live_ed3bf93ce6e076816f86f4c2f02' 
                });
            }
        });

        function openCheckout(priceId) {
            if (typeof Paddle !== 'undefined') {
                Paddle.Checkout.open({
                    settings: { displayMode: "overlay", theme: "light" },
                    items: [{ priceId: priceId, quantity: 1 }]
                });
            } else {
                alert("Paddle abhi load ho raha hai, zara ruk ke try karein.");
                console.error("Paddle is undefined.");
            }
        }
    </script>
</body>
</html>
